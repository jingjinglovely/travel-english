<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>旅行英语练习 - 新加坡 & 吉隆坡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;min-height:100vh;overflow-x:hidden}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:600;flex:1}
.back-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px 8px;display:none}
.speed-control{display:flex;align-items:center;gap:6px;font-size:13px}
.speed-control select{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;font-size:13px}
.speed-control select option{color:#333;background:#fff}

/* Home Screen */
.home{padding:16px}
.home-title{text-align:center;margin:20px 0 8px;font-size:22px;font-weight:700;color:#1a73e8}
.home-subtitle{text-align:center;color:#666;font-size:14px;margin-bottom:24px}
.scenario-grid{display:grid;grid-template-columns:1fr;gap:12px;max-width:500px;margin:0 auto}
.scenario-card{background:#fff;border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;gap:14px;border:2px solid transparent}
.scenario-card:active{transform:scale(.97)}
.scenario-card:hover{border-color:#1a73e8;box-shadow:0 4px 12px rgba(26,115,232,.15)}
.scenario-icon{font-size:36px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;background:#e8f0fe;border-radius:14px;flex-shrink:0}
.scenario-info{flex:1}
.scenario-info h3{font-size:16px;font-weight:600;margin-bottom:4px}
.scenario-info p{font-size:13px;color:#666;line-height:1.4}
.scenario-tag{font-size:11px;background:#e8f5e9;color:#2e7d32;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px}
.scenario-done{position:absolute;top:8px;right:8px;font-size:18px}
.scenario-card{position:relative}
.home-progress{text-align:center;color:#1a73e8;font-size:15px;font-weight:600;margin-bottom:16px}

/* Chat Screen */
.chat-screen{display:none;flex-direction:column;height:100vh}
.scene-intro{background:#fff3e0;padding:12px 16px;font-size:14px;color:#e65100;line-height:1.5;border-bottom:1px solid #ffe0b2}
.scene-intro b{color:#bf360c}
.chat-area{flex:1;overflow-y:auto;padding:16px;padding-bottom:180px}
.chat-bubble{max-width:85%;margin-bottom:12px;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.npc-bubble{display:flex;gap:10px;align-items:flex-start}
.npc-avatar{width:40px;height:40px;border-radius:50%;background:#1a73e8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.npc-text{background:#fff;border-radius:4px 18px 18px 18px;padding:12px 16px;font-size:15px;line-height:1.6;box-shadow:0 1px 3px rgba(0,0,0,.08);position:relative}
.npc-text-hidden{font-style:italic;color:#999;font-size:13px;cursor:pointer}
.npc-text-hidden:hover{color:#1a73e8}
.show-text-btn{background:none;border:none;color:#1a73e8;font-size:13px;cursor:pointer;padding:4px 0;margin-top:4px;text-decoration:underline;display:block}
.npc-name{font-size:12px;color:#888;margin-bottom:4px}
.replay-btn{background:none;border:none;color:#1a73e8;font-size:20px;cursor:pointer;padding:4px;margin-left:8px;vertical-align:middle}

.user-bubble{display:flex;justify-content:flex-end;gap:10px}
.user-text{background:#dcf8c6;border-radius:18px 4px 18px 18px;padding:12px 16px;font-size:15px;line-height:1.6;box-shadow:0 1px 3px rgba(0,0,0,.08)}

.hint-box{background:#fff8e1;border:1px solid #ffcc02;border-radius:14px;padding:12px 16px;margin:8px 0 12px;font-size:14px;line-height:1.6}
.hint-box .hint-label{font-size:12px;color:#f57f17;font-weight:600;margin-bottom:4px}

.correction-box{background:#fff;border-radius:14px;padding:14px 16px;margin:8px 0 12px;font-size:14px;line-height:1.7;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.correction-box.excellent{border-left:4px solid #4caf50}
.correction-box.good{border-left:4px solid #ff9800}
.correction-box.retry{border-left:4px solid #f44336}
.correction-status{font-weight:700;margin-bottom:6px}
.correction-status.excellent{color:#2e7d32}
.correction-status.good{color:#e65100}
.correction-status.retry{color:#c62828}
.correction-ref{color:#555;margin-top:6px}
.correction-ref b{color:#1a73e8}
.correction-tip{background:#f3e5f5;padding:8px 12px;border-radius:8px;margin-top:8px;font-size:13px;color:#6a1b9a}
.word-correct{color:#2e7d32}
.word-wrong{color:#c62828;text-decoration:line-through}
.word-missing{color:#1a73e8;font-weight:600}

/* Bottom Controls */
.controls{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 16px 28px;box-shadow:0 -2px 12px rgba(0,0,0,.1);display:flex;flex-direction:column;align-items:center;gap:10px;z-index:99}
.mic-row{display:flex;align-items:center;gap:16px;width:100%}
.mic-btn{width:64px;height:64px;border-radius:50%;border:none;background:#f44336;color:#fff;font-size:28px;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mic-btn:active{transform:scale(.9)}
.mic-btn.recording{animation:pulse 1s infinite;background:#d32f2f}
.mic-btn:disabled{background:#ccc;cursor:not-allowed}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(244,67,54,.4)}70%{box-shadow:0 0 0 16px rgba(244,67,54,0)}100%{box-shadow:0 0 0 0 rgba(244,67,54,0)}}
.text-input-row{display:flex;gap:8px;width:100%;align-items:center}
.text-input-row input{flex:1;border:1px solid #ddd;border-radius:24px;padding:10px 16px;font-size:15px;outline:none}
.text-input-row input:focus{border-color:#1a73e8}
.text-input-row button{background:#1a73e8;color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;flex-shrink:0}
.next-btn{background:#1a73e8;color:#fff;border:none;border-radius:24px;padding:10px 32px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
.next-btn:active{transform:scale(.97)}
.next-btn:disabled{background:#ccc;cursor:not-allowed}
.stop-btn{background:#d32f2f;color:#fff;border:none;border-radius:24px;padding:10px 20px;font-size:15px;font-weight:600;cursor:pointer;flex-shrink:0}
.stop-btn:active{transform:scale(.95)}
.play-ref-btn{background:none;border:none;color:#1a73e8;font-size:18px;cursor:pointer;padding:2px 6px;vertical-align:middle}
.or-divider{font-size:12px;color:#999}
.input-mode-toggle{font-size:13px;color:#1a73e8;background:none;border:none;cursor:pointer;text-decoration:underline}

/* Progress */
.progress-bar{height:3px;background:#e0e0e0;position:relative;margin-top:-3px}
.progress-fill{height:100%;background:#4caf50;transition:width .3s}

/* Result Screen */
.result-screen{display:none;padding:24px 16px;text-align:center}
.result-screen h2{font-size:22px;margin-bottom:16px;color:#1a73e8}
.result-stats{background:#fff;border-radius:16px;padding:20px;margin:16px auto;max-width:400px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stat-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:15px}
.stat-row:last-child{border:none}
.stat-label{color:#666}
.stat-value{font-weight:700}
.stat-value.green{color:#2e7d32}
.stat-value.orange{color:#e65100}
.stat-value.red{color:#c62828}
.result-btns{display:flex;gap:12px;margin-top:24px;justify-content:center;flex-wrap:wrap}
.result-btns button{padding:12px 28px;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;border:none}
.btn-retry{background:#fff;color:#1a73e8;border:2px solid #1a73e8 !important}
.btn-home{background:#1a73e8;color:#fff}

.hidden{display:none !important}
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" id="backBtn" onclick="confirmExit()">&#8592;</button>
  <h1 id="headerTitle">旅行英语练习</h1>
  <div class="speed-control">
    <label>语速</label>
    <select id="speedSelect" onchange="setSpeechRate(this.value)">
      <option value="0.6">慢</option>
      <option value="0.8">较慢</option>
      <option value="1">正常</option>
      <option value="1.2">快</option>
    </select>
  </div>
</div>

<div id="homeScreen" class="home">
  <div class="home-title">新加坡 & 吉隆坡</div>
  <div class="home-subtitle">选择一个场景开始练习听说</div>
  <div class="scenario-grid" id="scenarioGrid"></div>
</div>

<div id="chatScreen" class="chat-screen">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="scene-intro" id="sceneIntro"></div>
  <div class="chat-area" id="chatArea"></div>
  <div class="controls" id="controls">
    <div class="mic-row" id="micRow">
      <button class="mic-btn" id="micBtn" onclick="startRecording()">&#127908;</button>
      <button class="stop-btn hidden" id="stopBtn" onclick="stopRecording()">&#9632; 停止</button>
      <div style="flex:1;text-align:center">
        <div id="micStatus" style="font-size:14px;color:#666">点击麦克风开始说</div>
      </div>
    </div>
    <button class="input-mode-toggle" id="modeToggle" onclick="toggleInputMode()">切换到打字输入</button>
    <div class="text-input-row hidden" id="textRow">
      <input type="text" id="textInput" placeholder="输入你的英文回答..." onkeydown="if(event.key==='Enter')submitText()">
      <button onclick="submitText()">&#10148;</button>
    </div>
    <button class="next-btn hidden" id="nextBtn" onclick="nextTurn()">下一句 &#8594;</button>
  </div>
</div>

<div id="resultScreen" class="result-screen">
  <h2>练习完成！</h2>
  <div class="result-stats" id="resultStats"></div>
  <div class="result-btns">
    <button class="btn-retry" onclick="retryScenario()">再练一次</button>
    <button class="btn-home" onclick="goHome()">返回首页</button>
  </div>
</div>

<script>
// ===================== SCENARIO DATA =====================
const scenarios = [
// ========== DAY 1: 吉隆坡到达 ==========
{id:1,icon:"🛬",title:"吉隆坡入境",tag:"DAY1 KLIA",desc:"凌晨6点，你抵达KLIA机场，排队过入境检查。",npcName:"Immigration Officer",turns:[
{npc:"Passport, please. Where are you coming from?",hint:"递上护照，说你从中国来的。",expected:["Here's my passport. I'm coming from China.","Here you go. I flew in from China.","Sure, here you are. I'm from China."],keywords:["here","passport","china"],tips:"从哪来用 I'm coming from... / I flew in from...。"},
{npc:"How long will you stay in Malaysia?",hint:"你打算待3天。",expected:["Three days.","I'll be staying for three days.","About three days.","For 3 days."],keywords:["three","3","days"],tips:"简短回答 Three days 即可。"},
{npc:"What will you be doing here?",hint:"旅游，想去双子塔和马六甲。",expected:["I'm here for sightseeing. I plan to visit Petronas Towers and Melaka.","Tourism. I'd like to see the Petronas Towers.","I'm a tourist."],keywords:["tourist","sightseeing","tourism","petronas"],tips:"观光 sightseeing / tourism。"},
{npc:"Where will you be staying?",hint:"唐人街的福朋喜来登酒店。",expected:["At Four Points by Sheraton in Chinatown.","I'll be staying at Four Points Sheraton, Chinatown.","I booked a hotel in Chinatown."],keywords:["four","points","chinatown","hotel"],tips:"福朋喜来登 Four Points by Sheraton。"}
]},
{id:2,icon:"💱",title:"机场换钱",tag:"DAY1 KLIA",desc:"过了入境关，你想换一些马来西亚令吉。",npcName:"Money Changer",turns:[
{npc:"Hi, what currency would you like to exchange?",hint:"你想把人民币换成令吉。",expected:["I'd like to exchange Chinese yuan to Malaysian ringgit.","I want to change RMB to ringgit please.","Can I exchange yuan for ringgit?"],keywords:["exchange","yuan","ringgit","change"],tips:"人民币 Chinese yuan / RMB，令吉 ringgit。"},
{npc:"Sure. How much would you like to exchange?",hint:"换1000块人民币。",expected:["One thousand yuan, please.","1000 RMB please.","I'd like to exchange 1000 yuan."],keywords:["thousand","1000"],tips:"金额直接说数字即可。"},
{npc:"Today's rate is 1 yuan to 0.65 ringgit. So that'll be 650 ringgit. Is that okay?",hint:"汇率不太好，问有没有手续费。",expected:["Is there any commission or service fee?","Do you charge any fees?","Any extra charges on top of that?"],keywords:["commission","fee","charge"],tips:"手续费 commission / service fee。问有没有用 Is there any...? / Do you charge...?"}
]},
{id:3,icon:"📱",title:"买电话卡",tag:"DAY1 KLIA",desc:"你想买一张本地电话卡上网用。",npcName:"Shop Staff",turns:[
{npc:"Hi! Are you looking for a local SIM card?",hint:"是的，想要一张有流量的电话卡，用几天。",expected:["Yes, I need a SIM card with data for about 4 days.","I'd like a prepaid SIM with internet for a few days.","Yes, do you have a tourist SIM with data?"],keywords:["sim","data","days","tourist"],tips:"电话卡 SIM card，流量 data，预付费 prepaid。"},
{npc:"We have a tourist plan: 15GB data for 7 days at 25 ringgit. It includes calls too.",hint:"好的，就要这个。能帮我装上吗？",expected:["I'll take that one. Can you help me install it?","Sure, that sounds good. Could you set it up for me?","I'll go with that plan. Can you put it in my phone?"],keywords:["take","install","set","help"],tips:"帮我装上 help me install it / set it up for me。"},
{npc:"Sure! Can I see your phone? I'll set it up for you. You might need to restart your phone after.",hint:"好的，给你。要不要我先把旧卡取出来？",expected:["Here you go. Should I take out the old SIM first?","Here's my phone. Do I need to remove my current SIM?","Sure, here it is. Should I eject the old card first?"],keywords:["here","old","sim","remove","take"],tips:"取出旧卡 take out / remove the old SIM。"}
]},
{id:4,icon:"🚄",title:"买KLIA Express票",tag:"DAY1 机场快线",desc:"你要坐机场快线去市区KL Sentral。",npcName:"Ticket Staff",turns:[
{npc:"Good morning! Where would you like to go?",hint:"去KL Sentral，买一张单程票。",expected:["One ticket to KL Sentral, please.","I'd like a one-way ticket to KL Sentral.","KL Sentral, single trip please."],keywords:["kl","sentral","ticket","one"],tips:"单程 one way / single，往返 return / round trip。"},
{npc:"One way or return?",hint:"单程。",expected:["One way, please.","Just one way.","Single please."],keywords:["one","way","single"],tips:"单程 one way，往返 return。"},
{npc:"That's 55 ringgit. The next train departs in 10 minutes from Platform 1.",hint:"好的，刷卡。问车上有WiFi吗。",expected:["I'll pay by card. Does the train have WiFi?","Card please. Is there WiFi on the train?","Can I pay by card? And is WiFi available on board?"],keywords:["card","wifi","train"],tips:"车上 on the train / on board。"}
]},
{id:5,icon:"🚗",title:"打Grab去酒店",tag:"DAY1 市区",desc:"到了KL Sentral，你打Grab去酒店。",npcName:"Grab Driver",turns:[
{npc:"Hi! You're going to Four Points Sheraton Chinatown?",hint:"对的，确认目的地。",expected:["Yes, that's right.","Yes, Four Points Chinatown please.","Correct, thank you."],keywords:["yes","right","correct"],tips:"确认用 That's right / Correct。"},
{npc:"Is this your first time in KL?",hint:"是的，第一次来，很期待。",expected:["Yes, it's my first time here. I'm very excited!","Yeah, first time in Malaysia! I'm looking forward to exploring.","Yes, my first visit!"],keywords:["first","time","excited"],tips:"第一次来 my first time here / my first visit。"},
{npc:"Nice! You should try the food at Jalan Alor tonight. Best street food in KL!",hint:"好的，我正好打算今晚去！谢谢推荐。",expected:["That's actually my plan for tonight! Thanks for the tip!","I'm planning to go there tonight! Thank you for the recommendation.","Yes, it's on my list! Thanks!"],keywords:["plan","tonight","thank","tip"],tips:"正好打算去 That's my plan / It's on my list。"},
{npc:"Here we are. Four Points Sheraton. Have a great stay!",hint:"谢谢，一路很顺利。",expected:["Thank you! It was a smooth ride.","Thanks a lot! Have a nice day.","Thank you, great driving!"],keywords:["thank","smooth","ride"],tips:"一路顺利 smooth ride。"}
]},
{id:6,icon:"🏨",title:"福朋喜来登入住",tag:"DAY1 唐人街",desc:"你到了酒店前台办理入住。",npcName:"Front Desk",turns:[
{npc:"Welcome to Four Points by Sheraton. Do you have a reservation?",hint:"有预订，你的名字。",expected:["Yes, a reservation under Zhou Jingjing.","Yes, I booked a room. Last name Zhou.","I have a reservation. The name is Zhou."],keywords:["yes","reservation","zhou"],tips:"预订查询说 under + 名字 或 Last name + 姓。"},
{npc:"A King Deluxe Room for two nights, checking out June 19th. May I see your passport?",hint:"对的，递护照。问能不能提前入住。",expected:["Here's my passport. Is early check-in possible? I arrived very early.","Sure, here you go. Can I check in now? My flight arrived at 6 AM."],keywords:["passport","early","check","arrived"],tips:"提前入住 early check-in。"},
{npc:"Your room is ready! Here's your key card. Room 1208. Breakfast is 6:30 to 10 AM on the 2nd floor.",hint:"谢谢，问WiFi密码和去双子塔怎么走。",expected:["Thank you! What's the WiFi password? And how do I get to the Petronas Towers?","Thanks! Could you tell me the WiFi password? Also, what's the best way to KLCC?"],keywords:["wifi","password","petronas","klcc","how"],tips:"KLCC 是双子塔所在商圈。"},
{npc:"WiFi password is on the key card. For KLCC, take the MRT from Pasar Seni station, it's a 5-minute walk from here.",hint:"太好了，谢谢！",expected:["Perfect, thank you so much!","Great, thanks for the info!","Wonderful, thanks!"],keywords:["thank","perfect","great"],tips:"Pasar Seni 是唐人街附近的地铁站。"}
]},
{id:7,icon:"🏙️",title:"双子塔拍照",tag:"DAY1 KLCC",desc:"上午10:30，你来到双子塔拍照。",npcName:"Tourist",turns:[
{npc:"Excuse me, would you like me to take a photo for you?",hint:"太好了，请帮忙拍，以双子塔为背景。",expected:["Yes please! Can you get the towers in the background?","That would be great! With the Petronas Towers behind me please.","Sure, thank you! Please include the towers."],keywords:["yes","tower","background","please"],tips:"以…为背景 with ... in the background。"},
{npc:"Sure! Say cheese! ... Here you go. Want another one?",hint:"再拍一张竖的。",expected:["One more in portrait mode please.","Could you take a vertical one too?","Yes, a portrait one please."],keywords:["portrait","vertical","one","more"],tips:"竖拍 portrait / vertical，横拍 landscape。"},
{npc:"Great shots! Where are you from?",hint:"中国来的。你呢？",expected:["I'm from China. How about you?","From China! And you? Where are you from?","I'm Chinese. Where are you from?"],keywords:["china","chinese","where","you"],tips:"反问对方用 How about you? / And you?"}
]},
{id:8,icon:"🛍️",title:"KLCC商场买纪念品",tag:"DAY1 Suria KLCC",desc:"你在双子塔底下的Suria KLCC商场逛逛买纪念品。",npcName:"Shop Staff",turns:[
{npc:"Hello! Looking for anything special?",hint:"想买些冰箱贴和钥匙扣送朋友。",expected:["I'm looking for fridge magnets and keychains as gifts.","Do you have any fridge magnets or keychains?","I'd like some souvenirs, like magnets and keychains."],keywords:["fridge","magnet","keychain","gift","souvenir"],tips:"冰箱贴 fridge magnet，钥匙扣 keychain。"},
{npc:"We have these Petronas Towers magnets and KLCC keychains. Very popular!",hint:"好看，买5个冰箱贴。多少钱一个？",expected:["These are nice! How much is each magnet? I'd like five.","I'll take five magnets. What's the price per piece?","How much for one? I want five."],keywords:["five","5","how","much","magnet"],tips:"每个多少钱 How much each? / Price per piece?"},
{npc:"10 ringgit each, or 5 for 40 ringgit.",hint:"5个40，划算。就买5个。",expected:["Five for 40? Good deal. I'll take five.","That's a good price. Five please!","I'll go with five for 40 ringgit."],keywords:["five","5","deal","take","40"],tips:"划算 good deal / good price。"}
]},
{id:9,icon:"☕",title:"Pavilion商场咖啡",tag:"DAY1 武吉免登",desc:"下午2:30，你逛Pavilion商场，想喝杯咖啡歇歇。",npcName:"Barista",turns:[
{npc:"Hi! What can I get for you?",hint:"要一杯冰拿铁，中杯。",expected:["An iced latte please, medium size.","I'd like a medium iced latte.","Medium iced latte please."],keywords:["iced","latte","medium"],tips:"冰拿铁 iced latte，美式 Americano。"},
{npc:"Would you like any syrup? Vanilla, caramel, or hazelnut?",hint:"加焦糖。",expected:["Caramel please.","I'll add caramel syrup.","Caramel, please."],keywords:["caramel"],tips:"焦糖 caramel，香草 vanilla，榛果 hazelnut。"},
{npc:"18 ringgit. For here or to go?",hint:"在这喝。有没有充电插座？",expected:["For here please. Do you have any power outlets?","I'll drink here. Is there a place to charge my phone?","Here please. Any charging outlets available?"],keywords:["here","outlet","charge","power"],tips:"在这喝 for here，带走 to go。充电插座 power outlet。"}

// ===================== APP STATE =====================
let currentScenario = null;
let currentTurn = 0;
let speechRate = 0.8;
let isRecording = false;
let recognition = null;
let speechSupported = true;
let micSupported = true;
let results = {excellent:0, good:0, retry:0, corrections:[]};
let gotResult = false;

function getCompleted() {
  try { return JSON.parse(localStorage.getItem('travel-eng-done') || '[]'); } catch(e) { return []; }
}
function markCompleted(id) {
  const c = getCompleted();
  if (!c.includes(id)) { c.push(id); localStorage.setItem('travel-eng-done', JSON.stringify(c)); }
}

// ===================== INIT =====================
function init() {
  checkSpeechSupport();
  loadSpeechRate();
  renderHome();
}

function checkSpeechSupport() {
  if (!('speechSynthesis' in window)) speechSupported = false;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    micSupported = false;
  } else {
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
    recognition.onresult = handleSpeechResult;
    recognition.onerror = e => {
      isRecording = false;
      document.getElementById('stopBtn').classList.add('hidden');
      document.getElementById('micBtn').classList.remove('hidden');
      updateMicUI();
      if (e.error === 'no-speech') {
        document.getElementById('micStatus').textContent = '没有检测到声音，请再试一次';
      } else if (e.error === 'not-allowed') {
        document.getElementById('micStatus').textContent = '请允许麦克风权限';
      } else {
        document.getElementById('micStatus').textContent = '识别出错，请重试或切换到打字';
      }
    };
    recognition.onend = () => {
      isRecording = false;
      document.getElementById('stopBtn').classList.add('hidden');
      document.getElementById('micBtn').classList.remove('hidden');
      if (!gotResult) {
        document.getElementById('micStatus').textContent = '没有识别到内容，请再试一次或切换打字输入';
      }
      updateMicUI();
    };
  }
}

// ===================== HOME SCREEN =====================
function renderHome() {
  document.getElementById('homeScreen').style.display = '';
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('headerTitle').textContent = '旅行英语练习';
  const grid = document.getElementById('scenarioGrid');
  const done = getCompleted();
  const total = scenarios.length;
  const doneCount = done.length;
  grid.innerHTML = `<div class="home-progress">已完成 ${doneCount} / ${total} 个场景</div>` + scenarios.map(s => {
    const isDone = done.includes(s.id);
    return `
    <div class="scenario-card" onclick="startScenario(${s.id})">
      <div class="scenario-icon">${s.icon}</div>
      <div class="scenario-info">
        <h3>${s.title}</h3>
        <p>${s.desc}</p>
        <span class="scenario-tag">${s.tag} · ${s.turns.length}轮对话</span>
      </div>
      ${isDone ? '<span class="scenario-done">✅</span>' : ''}
    </div>`;
  }).join('');
}

// ===================== CHAT SCREEN =====================
function startScenario(id) {
  currentScenario = scenarios.find(s => s.id === id);
  currentTurn = 0;
  results = {excellent:0, good:0, retry:0, corrections:[]};

  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
  document.getElementById('backBtn').style.display = 'inline-block';
  document.getElementById('headerTitle').textContent = currentScenario.title;
  document.getElementById('sceneIntro').innerHTML = `<b>${currentScenario.icon} ${currentScenario.title}</b> — ${currentScenario.desc}`;
  document.getElementById('chatArea').innerHTML = '';
  updateProgress();
  showCurrentTurn();
}

function showCurrentTurn() {
  const turn = currentScenario.turns[currentTurn];
  const chat = document.getElementById('chatArea');

  // NPC bubble
  const npcDiv = document.createElement('div');
  npcDiv.className = 'chat-bubble';
  const initials = currentScenario.npcName.split(' ').map(w=>w[0]).join('');
  const npcId = 'npc-text-' + currentTurn;
  npcDiv.innerHTML = `
    <div class="npc-bubble">
      <div class="npc-avatar">${initials}</div>
      <div>
        <div class="npc-name">${currentScenario.npcName}</div>
        <div class="npc-text">
          <span id="${npcId}" style="display:none">${turn.npc}</span>
          <span class="npc-text-hidden" id="${npcId}-placeholder" onclick="toggleNpcText('${npcId}')">&#128276; 听不懂？点击显示原文</span>
          <button class="replay-btn" onclick="speakNPC()" title="重新播放">&#128264;</button>
        </div>
      </div>
    </div>
  `;
  chat.appendChild(npcDiv);

  // Hint
  const hintDiv = document.createElement('div');
  hintDiv.className = 'chat-bubble';
  hintDiv.innerHTML = `<div class="hint-box"><div class="hint-label">&#128161; 中文提示</div>${turn.hint}</div>`;
  chat.appendChild(hintDiv);

  scrollToBottom();
  speakNPC();
  resetControls();
}

function speakNPC() {
  speakEnglish(currentScenario.turns[currentTurn].npc);
}

function speakRef(id) {
  const el = document.getElementById(id);
  if (el) speakEnglish(el.textContent);
}

function speakEnglish(text) {
  if (!speechSupported) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = speechRate;
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Samantha'))
    || voices.find(v => v.lang.startsWith('en-US'))
    || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) u.voice = enVoice;
  window.speechSynthesis.speak(u);
}

// ===================== SPEECH RECOGNITION =====================
function toggleNpcText(id) {
  const text = document.getElementById(id);
  const placeholder = document.getElementById(id + '-placeholder');
  if (text.style.display === 'none') {
    text.style.display = '';
    placeholder.textContent = '🔔 点击隐藏原文';
  } else {
    text.style.display = 'none';
    placeholder.textContent = '🔔 听不懂？点击显示原文';
  }
}

function revealCurrentNpcText() {
  const id = 'npc-text-' + currentTurn;
  const text = document.getElementById(id);
  const placeholder = document.getElementById(id + '-placeholder');
  if (text) text.style.display = '';
  if (placeholder) placeholder.textContent = '🔔 点击隐藏原文';
}

function startRecording() {
  if (!micSupported) {
    document.getElementById('micStatus').textContent = '你的浏览器不支持语音识别，请使用打字输入';
    toggleInputMode();
    return;
  }
  try {
    recognition.abort();
  } catch(ignore) {}
  setTimeout(() => {
    try {
      gotResult = false;
      recognition.start();
      isRecording = true;
      document.getElementById('micStatus').textContent = '正在听你说...';
      document.getElementById('micBtn').classList.add('hidden');
      document.getElementById('stopBtn').classList.remove('hidden');
    } catch(e) {
      document.getElementById('micStatus').textContent = '录音启动失败：' + (e.message || e);
    }
    updateMicUI();
  }, 200);
}

function stopRecording() {
  if (isRecording && recognition) {
    recognition.stop();
    isRecording = false;
  }
  document.getElementById('stopBtn').classList.add('hidden');
  document.getElementById('micBtn').classList.remove('hidden');
  updateMicUI();
}

function updateMicUI() {
  const btn = document.getElementById('micBtn');
  btn.classList.toggle('recording', isRecording);
}

function handleSpeechResult(e) {
  gotResult = true;
  const texts = [];
  for (let i = 0; i < e.results[0].length; i++) {
    texts.push(e.results[0][i].transcript);
  }
  processUserResponse(texts[0], texts);
}

function toggleInputMode() {
  const micRow = document.getElementById('micRow');
  const textRow = document.getElementById('textRow');
  const toggle = document.getElementById('modeToggle');
  if (textRow.classList.contains('hidden')) {
    textRow.classList.remove('hidden');
    micRow.classList.add('hidden');
    toggle.textContent = '切换到语音输入';
  } else {
    textRow.classList.add('hidden');
    micRow.classList.remove('hidden');
    toggle.textContent = '切换到打字输入';
  }
}

function submitText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  processUserResponse(text, [text]);
}

// ===================== RESPONSE ANALYSIS =====================
function processUserResponse(mainText, alternatives) {
  const turn = currentScenario.turns[currentTurn];
  const chat = document.getElementById('chatArea');

  // Reveal NPC text after user responds
  revealCurrentNpcText();

  // User bubble
  const userDiv = document.createElement('div');
  userDiv.className = 'chat-bubble';
  userDiv.innerHTML = `<div class="user-bubble"><div class="user-text">${mainText}</div></div>`;
  chat.appendChild(userDiv);

  // Analyze
  const analysis = analyzeResponse(mainText, alternatives, turn);

  // Correction bubble
  const corrDiv = document.createElement('div');
  corrDiv.className = 'chat-bubble';
  let statusClass, statusText;
  if (analysis.score >= 0.8) {
    statusClass = 'excellent'; statusText = '&#9989; 非常好！';
    results.excellent++;
  } else if (analysis.score >= 0.5) {
    statusClass = 'good'; statusText = '&#128076; 不错，可以更好：';
    results.good++;
  } else {
    statusClass = 'retry'; statusText = '&#128172; 再看看参考表达：';
    results.retry++;
  }

  let corrHTML = `<div class="correction-box ${statusClass}">`;
  corrHTML += `<div class="correction-status ${statusClass}">${statusText}</div>`;

  const refId = 'ref-' + Date.now();
  if (analysis.score >= 1.0) {
    corrHTML += `<div class="correction-ref" style="color:#2e7d32">完美！和参考答案完全一致。</div>`;
    corrHTML += `<div class="correction-ref"><span id="${refId}" style="display:none">${analysis.bestMatch}</span><button class="play-ref-btn" onclick="speakRef('${refId}')" title="播放参考答案">&#128264; 听参考发音</button></div>`;
  } else if (analysis.score >= 0.8) {
    corrHTML += `<div class="correction-ref" style="color:#2e7d32">你的表达没问题！以下是另一种常见说法供参考：</div>`;
    corrHTML += `<div class="correction-ref"><b>参考：</b><span id="${refId}">${analysis.bestMatch}</span> <button class="play-ref-btn" onclick="speakRef('${refId}')" title="播放参考答案">&#128264;</button></div>`;
  } else {
    corrHTML += `<div class="correction-ref"><b>参考回答：</b><span id="${refId}">${analysis.bestMatch}</span> <button class="play-ref-btn" onclick="speakRef('${refId}')" title="播放参考答案">&#128264;</button></div>`;
    if (analysis.yourIssues.length > 0) {
      corrHTML += `<div class="correction-ref" style="margin-top:4px"><b>你说的：</b>${analysis.highlighted}</div>`;
    }
  }

  if (turn.tips) {
    corrHTML += `<div class="correction-tip">&#128218; ${turn.tips}</div>`;
  }
  corrHTML += '</div>';
  corrDiv.innerHTML = corrHTML;
  chat.appendChild(corrDiv);

  results.corrections.push({turn: currentTurn, score: analysis.score, user: mainText, ref: analysis.bestMatch});

  // Show next button
  document.getElementById('micRow').classList.add('hidden');
  document.getElementById('textRow').classList.add('hidden');
  document.getElementById('modeToggle').classList.add('hidden');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.remove('hidden');
  nextBtn.textContent = currentTurn < currentScenario.turns.length - 1 ? '下一句 →' : '查看结果 →';
  nextBtn.disabled = false;

  scrollToBottom();
}

function analyzeResponse(mainText, alternatives, turn) {
  const normalize = s => s.toLowerCase().replace(/[.,!?;:'"]/g, '').replace(/\s+/g,' ').trim();
  const mainNorm = normalize(mainText);

  let bestMatch = turn.expected[0];
  let bestScore = 0;

  for (const alt of alternatives) {
    const altNorm = normalize(alt);
    for (const exp of turn.expected) {
      const expNorm = normalize(exp);
      const score = computeScore(altNorm, expNorm, turn.keywords);
      if (score > bestScore) {
        bestScore = score;
        bestMatch = exp;
      }
    }
  }

  // Also check main text against all expected
  for (const exp of turn.expected) {
    const expNorm = normalize(exp);
    const score = computeScore(mainNorm, expNorm, turn.keywords);
    if (score > bestScore) {
      bestScore = score;
      bestMatch = exp;
    }
  }

  // Highlight issues
  const {highlighted, issues} = highlightDiff(mainNorm, normalize(bestMatch));

  return {score: bestScore, bestMatch, highlighted, yourIssues: issues};
}

function computeScore(userText, expected, keywords) {
  if (userText === expected) return 1.0;

  const userWords = userText.split(/\s+/).filter(Boolean);
  const expWords = expected.split(/\s+/).filter(Boolean);

  // Word overlap (Jaccard-like)
  const userSet = new Set(userWords);
  const expSet = new Set(expWords);
  const intersection = [...userSet].filter(w => expSet.has(w));
  const union = new Set([...userSet, ...expSet]);
  const jaccard = intersection.length / union.size;

  // Keyword match bonus
  let keywordScore = 0;
  let keywordAllMatch = false;
  if (keywords && keywords.length > 0) {
    const matched = keywords.filter(k => userText.includes(k.toLowerCase()));
    keywordScore = matched.length / keywords.length;
    keywordAllMatch = matched.length === keywords.length;
  }

  // Word order similarity (LCS ratio)
  const lcsLen = lcs(userWords, expWords);
  const orderScore = lcsLen / Math.max(userWords.length, expWords.length, 1);

  // Combine scores
  let score = jaccard * 0.35 + keywordScore * 0.35 + orderScore * 0.3;

  // If all keywords matched and sentence is reasonably long, boost score
  if (keywordAllMatch && userWords.length >= 3) score = Math.max(score, 0.82);

  return score;
}

function lcs(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  return dp[m][n];
}

function highlightDiff(userNorm, expectedNorm) {
  const userWords = userNorm.split(/\s+/).filter(Boolean);
  const expWords = expectedNorm.split(/\s+/).filter(Boolean);
  const expSet = new Set(expWords);
  const userSet = new Set(userWords);
  const issues = [];

  const highlighted = userWords.map(w => {
    if (expSet.has(w)) return `<span class="word-correct">${w}</span>`;
    issues.push(w);
    return `<span class="word-wrong">${w}</span>`;
  }).join(' ');

  const missing = expWords.filter(w => !userSet.has(w));
  const missingHTML = missing.length > 0
    ? ' <span class="word-missing">[缺少: ' + missing.join(', ') + ']</span>'
    : '';

  return {highlighted: highlighted + missingHTML, issues};
}

// ===================== NAVIGATION =====================
function nextTurn() {
  currentTurn++;
  updateProgress();
  if (currentTurn >= currentScenario.turns.length) {
    showResults();
  } else {
    showCurrentTurn();
    resetControls();
  }
}

function resetControls() {
  const micRow = document.getElementById('micRow');
  const textRow = document.getElementById('textRow');
  const toggle = document.getElementById('modeToggle');
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('hidden');
  toggle.classList.remove('hidden');

  document.getElementById('stopBtn').classList.add('hidden');
  document.getElementById('micBtn').classList.remove('hidden');
  if (micSupported) {
    micRow.classList.remove('hidden');
    textRow.classList.add('hidden');
    toggle.textContent = '切换到打字输入';
    document.getElementById('micStatus').textContent = '点击麦克风开始说';
  } else {
    micRow.classList.add('hidden');
    textRow.classList.remove('hidden');
    toggle.textContent = '切换到语音输入';
  }
}

function updateProgress() {
  const total = currentScenario ? currentScenario.turns.length : 1;
  const pct = ((currentTurn) / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

function confirmExit() {
  if (currentScenario && currentTurn < currentScenario.turns.length) {
    if (!confirm('确定退出当前练习吗？进度不会保存。')) return;
  }
  goHome();
}

function goHome() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  if (isRecording && recognition) { recognition.stop(); isRecording = false; }
  renderHome();
}

function setSpeechRate(val) {
  speechRate = parseFloat(val);
  try { localStorage.setItem('travel-eng-speed', val); } catch(e) {}
}

function loadSpeechRate() {
  try {
    const saved = localStorage.getItem('travel-eng-speed');
    if (saved) {
      speechRate = parseFloat(saved);
      document.getElementById('speedSelect').value = saved;
    }
  } catch(e) {}
}

function scrollToBottom() {
  const chat = document.getElementById('chatArea');
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 100);
}

// ===================== RESULTS =====================
function showResults() {
  markCompleted(currentScenario.id);
  document.getElementById('chatScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = '';
  document.getElementById('backBtn').style.display = 'inline-block';

  const total = results.excellent + results.good + results.retry;
  const pct = Math.round(results.excellent / total * 100);

  let html = `
    <div class="stat-row"><span class="stat-label">场景</span><span class="stat-value">${currentScenario.title}</span></div>
    <div class="stat-row"><span class="stat-label">总对话轮数</span><span class="stat-value">${total}</span></div>
    <div class="stat-row"><span class="stat-label">&#9989; 完美</span><span class="stat-value green">${results.excellent}</span></div>
    <div class="stat-row"><span class="stat-label">&#128076; 不错</span><span class="stat-value orange">${results.good}</span></div>
    <div class="stat-row"><span class="stat-label">&#128172; 需改进</span><span class="stat-value red">${results.retry}</span></div>
    <div class="stat-row"><span class="stat-label">准确率</span><span class="stat-value ${pct>=80?'green':pct>=50?'orange':'red'}">${pct}%</span></div>
  `;

  if (results.corrections.filter(c=>c.score<0.8).length > 0) {
    html += '<div style="text-align:left;margin-top:16px;font-size:14px;font-weight:600;color:#666">需要改进的句子：</div>';
    results.corrections.filter(c=>c.score<0.8).forEach(c => {
      html += `<div style="text-align:left;margin-top:8px;font-size:13px;line-height:1.5;padding:8px 0;border-bottom:1px solid #f0f0f0">
        <div style="color:#c62828">你说的：${c.user}</div>
        <div style="color:#1a73e8">参考：${c.ref}</div>
      </div>`;
    });
  }

  document.getElementById('resultStats').innerHTML = html;
}

function retryScenario() {
  if (currentScenario) startScenario(currentScenario.id);
}

// ===================== VOICE INIT =====================
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  window.speechSynthesis.getVoices();
}

init();
</script>
</body>
</html>
